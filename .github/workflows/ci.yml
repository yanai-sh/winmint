name: CI

on:
  push:
    branches:
      - main
      - architecture/**
      - codex/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate PowerShell
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell 7.6
        uses: PSModule/install-powershell@v1
        with:
          Version: '7.6.2'

      - name: Prepare contract test fixtures
        shell: pwsh
        run: |
          $isoDir = 'tests/fixtures/iso'
          $isoPath = Join-Path $isoDir 'official-win11-25h2-english-arm64-v2.iso'
          New-Item -ItemType Directory -Force -Path $isoDir | Out-Null
          if (-not (Test-Path -LiteralPath $isoPath)) {
            New-Item -ItemType File -Force -Path $isoPath | Out-Null
          }

      - name: Validate syntax and profile invariants
        shell: pwsh
        run: |
          ./tests/contract/Test-ProfileInvariants.ps1
          ./tools/validation/Validate.ps1 -RunAnalyzer

  gui_dev:
    name: GUI crate (Rust)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache for GUI
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/gui

      - name: cargo check and test - GUI crate
        shell: pwsh
        run: |
          cargo check --manifest-path apps/gui/Cargo.toml
          cargo test --manifest-path apps/gui/Cargo.toml
