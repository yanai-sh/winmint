<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WinMint</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="wizard.css" />
</head>
<body>
  <div class="wizard" id="wizard-root">
    <header class="wizard-titlebar" id="wizard-titlebar">
      <div class="titlebar-leading">
        <span class="titlebar-app">WinMint</span>
      </div>
      <div class="titlebar-controls" id="window-controls" aria-label="Window controls">
        <button type="button" class="win-btn" data-action="minimize" aria-label="Minimize window">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="5.5" width="10" height="1" fill="currentColor" /></svg>
        </button>
        <button type="button" class="win-btn" data-action="maximize" id="btn-maximize" aria-label="Maximize window">
          <svg class="icon-maximize" viewBox="0 0 12 12" aria-hidden="true"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1" /></svg>
          <svg class="icon-restore hidden" viewBox="0 0 12 12" aria-hidden="true">
            <rect x="3" y="1" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1" />
            <rect x="1" y="3" width="8" height="8" fill="var(--surface-raised)" stroke="currentColor" stroke-width="1" />
          </svg>
        </button>
        <button type="button" class="win-btn win-btn-close" data-action="close" aria-label="Close window">
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path d="M1 1 L11 11 M11 1 L1 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </header>

    <div class="wizard-progress" aria-hidden="true">
      <div class="progress-rail"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <main class="wizard-main" id="wizard-main"></main>

    <footer class="wizard-footer">
      <p class="wizard-stage" id="stage-label" aria-live="polite">Source</p>
      <div class="wizard-actions">
        <button type="button" class="btn btn-ghost" id="btn-back">Back</button>
        <button type="button" class="btn btn-primary" id="btn-next">Continue</button>
      </div>
    </footer>
  </div>
  <script src="wizard.js"></script>
</body>
</html>
